<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; connect-src 'self' https://*.amazonaws.com https://cognito-idp.ap-northeast-1.amazonaws.com; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <title>Concordia Shrine — Browser Prototype</title>
  <link rel="stylesheet" href="style.css">
  <script>
    if (typeof global === 'undefined') {
      window.global = window;
    }
  </script>
</head>

<body>
  <main>
    <section class="panel">
      <div class="title">Concordia Shrine</div>
      <div class="subtitle">空気だけを聴くブラウザ版プロトタイプ</div>
      <div class="guardian-badge">
        <div class="guardian-icon"></div>
        <span>Sanctuary Active</span>
      </div>
      <div class="controls">
        <div style="display: flex; gap: 8px; width: 100%;">
          <button id="login-btn"
            style="flex: 1; background: linear-gradient(135deg, #667eea, #764ba2); z-index: 10000; position: relative;">ログイン</button>
          <button id="guest-btn"
            style="flex: 1; background: linear-gradient(135deg, #667eea, #764ba2); z-index: 10000; position: relative;">ゲストとして体験</button>
        </div>
        <button id="logout-btn" style="width: 100%; display: none; background: #4a5568;">ログアウト</button>
        <div id="app-controls" style="display: none; width: 100%;">
          <button id="start-btn" style="margin-top: 8px;">マイクを許可して開始</button>
          <button id="stop-btn" style="margin-top: 8px; width: 100%; display: none;">終了して文字起こしを保存</button>
        </div>
        <span id="status" style="margin-top: 8px; display: block;">未ログイン</span>
      </div>
      <div class="divider"></div>
      <div style="margin-top: 12px;">
        <button id="demo-btn" style="width: 100%; margin-bottom: 8px;">デモモード</button>
        <div id="demo-controls" style="display: none; gap: 6px; flex-wrap: wrap;">
          <button class="demo-scene-btn" data-scene="静寂">静寂</button>
          <button class="demo-scene-btn" data-scene="調和">調和</button>
          <button class="demo-scene-btn" data-scene="沈黙">沈黙</button>
          <button class="demo-scene-btn" data-scene="一方的">一方的</button>
        </div>
      </div>
      <div class="divider"></div>
      <div class="scene-label" id="scene-label">scene: 静寂</div>
      <div class="scene-desc" id="scene-desc">声と静けさが、ゆっくり行き来しています。</div>
      <div class="divider" style="margin-top: 10px;"></div>
      <div class="scene-desc" id="debug-info" style="font-size: 11px; color: rgba(230,242,255,0.6);">デバッグ: 待機中</div>
    </section>
    <canvas id="scene" width="960" height="600" aria-hidden="true"></canvas>

    <!-- Login Modal -->
    <div id="login-modal"
      style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 20000; align-items: center; justify-content: center;">
      <div
        style="background: #1a202c; padding: 2rem; border-radius: 8px; width: 320px; text-align: center; border: 1px solid #4a5568; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
        <h2 style="color: #fff; margin-bottom: 1.5rem; margin-top: 0;">ログイン</h2>
        <input type="text" id="username-input" placeholder="ユーザー名"
          style="width: 100%; padding: 10px; margin-bottom: 1rem; border-radius: 4px; border: 1px solid #4a5568; background: #2d3748; color: #fff;">
        <input type="password" id="password-input" placeholder="パスワード"
          style="width: 100%; padding: 10px; margin-bottom: 1rem; border-radius: 4px; border: 1px solid #4a5568; background: #2d3748; color: #fff;">
        <div id="login-error" style="color: #ff6b6b; font-size: 0.9rem; margin-bottom: 1rem; display: none;"></div>
        <button id="modal-login-btn"
          style="width: 100%; padding: 10px; background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-bottom: 1rem;">サインイン</button>
        <button id="modal-close-btn"
          style="background: transparent; color: #a0aec0; border: none; cursor: pointer; text-decoration: underline;">閉じる</button>
      </div>
    </div>
  </main>
  <script type="module" src="app.js"></script>
</body>

</html>
