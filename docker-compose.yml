services:
  concordia:
    build: .
    image: concordia-shrine:latest
    environment:
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
    # Audio device mapping - only works on Linux
    # Uncomment the devices section if running on Linux and you need audio support
    # devices:
    #   - /dev/snd
    # Uncomment if you need network for package downloads in-container (not used at runtime)
    # network_mode: host
